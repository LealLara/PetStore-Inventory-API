services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petstore-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Data Source=/data/PetStore.db
    ports:
      - "5000:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped